<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso · INFORME APS</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
        --navy: #0a1f3d;
        --teal: #00b09b;
        --surface: #ffffff;
        --border: #dde4ef;
        --text-dark: #1a2840;
        --text-muted: #5d7290;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Sora', sans-serif;
    }

    body {
        /* Fondo con imagen administrativa/salud y capa de gradiente institucional */
        background: linear-gradient(135deg, rgba(10, 31, 61, 0.85) 0%, rgba(0, 176, 155, 0.75) 100%),
                    url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?q=80&w=2053&auto=format&fit=crop') center/cover no-repeat fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    .login-box {
        background: var(--surface);
        padding: 45px 40px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
        position: relative;
    }

    .logos-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
        padding-bottom: 20px;
        border-bottom: 1px dashed var(--border);
    }

    .logos-container img {
        max-height: 55px;
        width: auto;
        object-fit: contain;
    }

    h1 {
        color: var(--navy);
        font-size: 1.4rem;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: 0.5px;
    }

    p {
        color: var(--text-muted);
        font-size: 0.85rem;
        margin-bottom: 30px;
    }

    .form-group {
        text-align: left;
        margin-bottom: 18px;
    }

    label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    input {
        width: 100%;
        padding: 12px 15px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        outline: none;
        transition: all 0.3s ease;
        font-size: 0.95rem;
        color: var(--text-dark);
        background-color: #f8fafc;
    }

    input:focus {
        border-color: var(--teal);
        background-color: var(--surface);
        box-shadow: 0 0 0 3px rgba(0, 176, 155, 0.1);
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: var(--navy);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn:hover {
        background: #002244;
        box-shadow: 0 4px 12px rgba(10, 31, 61, 0.3);
    }

    .footer-text {
        margin-top: 25px;
        font-size: 0.7rem;
        color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-box">
    <!-- Contenedor de Logos Institucionales -->
    <div class="logos-container">
      <img src="/static/img/logo-ese.png" alt="Logo ESE">
      <img src="/static/img/logo-aps.png" alt="Logo APS">
    </div>

    <h1>INFORME APS</h1>
    <p>Sistema Modular de Gestión y Reportes</p>

    <form onsubmit="ingresar(event)">
      <div class="form-group">
        <label>Usuario / Documento</label>
        <input type="text" id="user" required placeholder="Ingrese su usuario">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="pass" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Ingresar al Sistema</button>
    </form>

    <div class="footer-text">
        Plataforma unificada de gestión APS y anexos PISIS.
    </div>
  </div>

  <script>
    function ingresar(e) {
      e.preventDefault();
      localStorage.setItem('isAdmin', 'true');
      window.location.href = "/";
    }
  </script>

</body>
</html>
